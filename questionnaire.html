```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Llama Meetup Team Survey</title>

<!-- Your site stylesheet -->
<link rel="stylesheet" href="https://nctrip.wascomb.com/style.css">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

</head>

<body>

<div class="container">

<div class="form-header">
<h1>Team Balancing Survey</h1>
<div class="header-info">
<h2>NC Llama Meetup Competition</h2>
<p>Please answer honestly so teams can be balanced.</p>
</div>
</div>

<form id="meetupForm">

<h2>Participant Information</h2>

<div class="form-group">
<label>Name</label>
<input type="text" name="name" required>
</div>

<hr>

<h2>Rate Each Statement (1-5)</h2>
<p>1 = Strongly Disagree | 5 = Strongly Agree</p>

<div id="questions"></div>

<button type="submit" class="submit-btn">Submit Survey</button>

</form>

</div>

<script>

(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

const questions = [

"I enjoy highly competitive environments.",
"I stay calm during timed challenges.",
"I enjoy solving puzzles and logic problems.",
"I prefer physically active challenges.",
"I like taking leadership roles.",
"I prefer supporting others instead of leading.",
"I enjoy strategy and planning games.",
"I work well with new teammates.",
"I can persuade others to follow a strategy.",
"I enjoy creative or improvisational challenges.",
"I am comfortable performing in front of others.",
"I am willing to take risks for my team.",
"I analyze problems before acting.",
"I help keep morale high in stressful situations.",
"I enjoy long endurance challenges.",
"I adapt quickly to rule changes.",
"I enjoy playful trash talk with competitors.",
"I prefer collaboration over spotlight.",
"I notice details others miss.",
"I try unconventional ideas.",
"I stay positive even when losing.",
"I enjoy social games and icebreakers.",
"I am motivated by team success.",
"I enjoy planning tactics before starting."

];

const container = document.getElementById("questions");

questions.forEach((q,i)=>{

const div = document.createElement("div");
div.className = "form-group";

div.innerHTML = `
<label>${i+1}. ${q}</label>
<div>
<label><input type="radio" name="q${i}" value="1" required>1</label>
<label><input type="radio" name="q${i}" value="2">2</label>
<label><input type="radio" name="q${i}" value="3">3</label>
<label><input type="radio" name="q${i}" value="4">4</label>
<label><input type="radio" name="q${i}" value="5">5</label>
</div>
`;

container.appendChild(div);

});

document.getElementById("meetupForm").addEventListener("submit", function(e){

e.preventDefault();

const formData = new FormData(this);

let responseText = "";

questions.forEach((q,i)=>{
responseText += `${i+1}. ${q}: ${formData.get("q"+i)}\n`;
});

const templateParams = {
name: formData.get("name"),
responses: responseText
};

emailjs.send(
"YOUR_SERVICE_ID",
"YOUR_TEMPLATE_ID",
templateParams
).then(() => {

alert("Survey submitted successfully!");

this.reset();

}, () => {

alert("Submission failed.");

});

});

</script>

</body>
</html>
```
